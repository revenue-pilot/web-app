name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: revenuepilot
          POSTGRES_PASSWORD: password
          POSTGRES_DB: revenuepilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Generate Prisma Client
      run: npx turbo run generate --filter=database
      
    - name: Run Prisma Migrations
      env:
        DATABASE_URL: postgresql://revenuepilot:password@localhost:5432/revenuepilot?schema=public
      run: cd packages/database && npx prisma migrate deploy
      
    - name: Build applications
      run: npx turbo run build
      
    # - name: Run tests (Uncomment when tests are implemented to prevent failing builds)
    #   run: npx turbo run test

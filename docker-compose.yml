
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: revenuepilot
      POSTGRES_PASSWORD: password
      POSTGRES_DB: revenuepilot
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revenuepilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '4001:3001'
    environment:
      - DATABASE_URL=postgresql://revenuepilot:password@postgres:5432/revenuepilot?schema=public
      - DIRECT_URL=postgresql://revenuepilot:password@postgres:5432/revenuepilot?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super-secret-key-for-dev-only
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/usr/src/app/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4001
      - NODE_ENV=development

volumes:
  pgdata:
  redisdata:
  uploads_data:
